<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Coral glow accent -->
  <circle cx="1000" cy="100" r="300" fill="#ff5f3e" opacity="0.15"/>
  <circle cx="200" cy="550" r="250" fill="#ff5f3e" opacity="0.08"/>
  <!-- Scissors icon -->
  <g transform="translate(100, 80)" stroke="#ff5f3e" stroke-width="4" stroke-linecap="round" fill="none">
    <circle cx="14" cy="52" r="8"/>
    <circle cx="42" cy="52" r="8"/>
    <line x1="20" y1="47" x2="38" y2="12"/>
    <line x1="36" y1="47" x2="18" y2="12"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="280" font-family="'Instrument Serif', 'Times New Roman', serif"
        font-size="120" font-style="italic" letter-spacing="-0.03em" fill="#f4f1ea">
    Clip<tspan fill="#ff5f3e">sy</tspan>
  </text>
  <!-- Tagline -->
  <text x="100" y="360" font-family="'Instrument Serif', serif"
        font-size="44" font-style="italic" letter-spacing="-0.02em" fill="#a09b8d">
    Turn long videos into viral shorts.
  </text>
  <!-- Feature badges -->
  <g font-family="'Geist Mono', monospace" font-size="16" letter-spacing="0.1em" fill="#6b6761">
    <text x="100" y="500">AI-RANKED CLIPS</text>
    <text x="340" y="500">· AUTO CAPTIONS</text>
    <text x="560" y="500">· SONNET BRAIN</text>
    <text x="780" y="500">· HINDI SUPPORT</text>
  </g>
  <!-- URL hint -->
  <text x="100" y="570" font-family="'Geist Mono', monospace" font-size="14"
        letter-spacing="0.15em" fill="#6b6761">CLIPSY.AI</text>
</svg>
